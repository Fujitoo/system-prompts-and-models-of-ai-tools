# Netlify configuration for AI Agent Finder (Vite)
# Place this file in the root of your project

[build]
  # Build command to run (Vite outputs to 'dist' by default)
  command = "npm run build"

[build.environment]
  # Ensure Node version is compatible
  NODE_VERSION = "18"

# Redirect rules for Single Page Application (SPA)
# Ensures all routes serve index.html so React Router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
